# Weights & Biases hyperparameter sweep — searches over training.* config
# values, reusing train.py exactly as-is (no code changes needed): the wandb
# agent invokes `python train.py training.lr=... training.hidden_dims=...`
# via the ${args_no_hyphens} macro below, which is already valid Hydra
# command-line override syntax.
#
# Usage:
#   wandb sweep sweep.yaml                              # prints a sweep ID
#   wandb agent <entity>/<project>/<sweep_id>            # runs trials
#   wandb agent <entity>/<project>/<sweep_id> --count 10  # cap at 10 trials
program: train.py
project: adc-penetration-surrogate
method: bayes
metric:
  name: test/phys_R2
  goal: maximize
parameters:
  training.lr:
    values: [0.0001, 0.0005, 0.001, 0.005]
  training.hidden_dims:
    values: ["[128,128]", "[256,256,256]", "[256,256,256,256]"]
  training.activation:
    values: [relu, gelu]
  training.batch_size:
    values: [128, 256, 512]
  training.epochs:
    value: 200
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}
